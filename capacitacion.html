<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Acceso capacitación</title>
    <script>
      (function () {
        var p = window.location.pathname || "";
        if (p.indexOf("/pages/capacitacion") >= 0) {
          return;
        }
        if (/capacitacion\.html$/i.test(p)) {
          var dir = p.replace(/[^/]+\.html$/i, "");
          window.location.replace(dir + "pages/capacitacion.html" + window.location.search + window.location.hash);
        }
      })();
    </script>
    <link rel="stylesheet" href="common.css" />
  </head>
  <body>
    <div class="page-inner" style="max-width: 760px">
      <div class="card" style="margin-top: 1rem">
        <div style="display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.5rem">
          <img
            src="https://res.cloudinary.com/drunurx3a/image/upload/v1767735454/paestextil/products/r9n4oib5wmaby9vsq3yh.png"
            alt="Logo CASEVIP"
            style="height: 52px; width: auto"
          />
          <div>
            <p style="margin: 0; color: var(--color-text-muted)">Capacitación</p>
            <h2 id="tituloCap" style="margin: 0.2rem 0 0">Cargando…</h2>
          </div>
        </div>

        <p id="fechaCap" style="margin-top: 0"></p>
        <div id="msg" class="msg msg--error" hidden></div>

        <form id="formAcceso" class="kpis-form-grid">
          <div class="field" style="margin-bottom: 0">
            <label for="fDoc">Número de documento</label>
            <input id="fDoc" class="input" type="text" maxlength="20" required />
          </div>
          <div class="field" style="margin-bottom: 0">
            <label for="fNom">Apellidos y nombres</label>
            <input id="fNom" class="input" type="text" maxlength="140" required />
          </div>
          <div class="field" style="margin-bottom: 0">
            <label for="fCliente">Cliente</label>
            <select id="fCliente" class="input" required></select>
          </div>
          <div class="field" style="margin-bottom: 0">
            <label for="fUnidad">Unidad</label>
            <select id="fUnidad" class="input" required disabled></select>
          </div>
          <div class="field kpis-form-actions" style="margin-bottom: 0">
            <button id="btnAcceder" class="btn btn--primary" type="submit" style="margin-top: 1.35rem; width: 100%">
              <span id="btnLbl">Acceder</span>
              <span id="btnSp" class="spinner" hidden aria-hidden="true"></span>
            </button>
          </div>
        </form>
      </div>
    </div>

    <dialog id="dlgLink" class="modal">
      <div class="modal__header">
        <h3>Acceso a capacitación</h3>
      </div>
      <div class="modal__body">
        <p>Registro realizado correctamente. Pulse el enlace para iniciar:</p>
        <p><a id="capLink" href="#" target="_blank" rel="noopener noreferrer"></a></p>
      </div>
      <div class="modal__actions">
        <button type="button" class="btn btn--ghost" id="btnCerrarDlg">Cerrar</button>
      </div>
    </dialog>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/capacitacion-publica.js"></script>
  </body>
</html>
